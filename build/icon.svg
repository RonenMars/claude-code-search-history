<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep dark indigo-black -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E1B34"/>
      <stop offset="100%" stop-color="#0C0B18"/>
    </linearGradient>

    <!-- Subtle orange ambient glow behind the lens -->
    <radialGradient id="bgGlow" cx="410" cy="385" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6A28" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#FF6A28" stop-opacity="0"/>
    </radialGradient>

    <!-- Magnifying glass ring: Claude orange gradient -->
    <linearGradient id="ringGrad" x1="166" y1="141" x2="660" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFA87A"/>
      <stop offset="100%" stop-color="#C13800"/>
    </linearGradient>

    <!-- Handle: darker orange for depth -->
    <linearGradient id="handleGrad" x1="490" y1="468" x2="868" y2="852" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D94500"/>
      <stop offset="100%" stop-color="#7E1E00"/>
    </linearGradient>

    <!-- Lens glass: dark purple-blue tint -->
    <radialGradient id="lensGrad" cx="380" cy="348" r="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2E2850"/>
      <stop offset="60%" stop-color="#221E3C"/>
      <stop offset="100%" stop-color="#191629"/>
    </radialGradient>

    <!-- Clip to macOS rounded rect -->
    <clipPath id="appClip">
      <rect width="1024" height="1024" rx="224"/>
    </clipPath>

    <!-- Clip conversation bars to lens interior -->
    <clipPath id="lensClip">
      <circle cx="410" cy="385" r="212"/>
    </clipPath>

    <!-- Soft drop shadow for handle -->
    <filter id="handleShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Subtle inner lens glow -->
    <radialGradient id="lensSheen" cx="340" cy="280" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ── Background ── -->
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#bgGlow)"/>

  <g clip-path="url(#appClip)">

    <!-- ── Handle shadow (depth layer) ── -->
    <line x1="490" y1="468" x2="868" y2="852"
          stroke="#000000" stroke-opacity="0.45" stroke-width="94" stroke-linecap="round"/>

    <!-- ── Handle ── -->
    <line x1="490" y1="468" x2="868" y2="852"
          stroke="url(#handleGrad)" stroke-width="80" stroke-linecap="round"/>

    <!-- Handle top-edge highlight (subtle bevel) -->
    <line x1="490" y1="468" x2="868" y2="852"
          stroke="#ffffff" stroke-opacity="0.07" stroke-width="38" stroke-linecap="round"
          transform="translate(-7,-7)"/>

    <!-- ── Lens glass fill ── -->
    <circle cx="410" cy="385" r="244" fill="url(#lensGrad)"/>

    <!-- Lens inner sheen (top-left reflection) -->
    <circle cx="410" cy="385" r="244" fill="url(#lensSheen)"/>

    <!-- ── Conversation bars (clipped inside the lens) ── -->
    <g clip-path="url(#lensClip)">

      <!-- User message 1 (left-aligned, white) -->
      <rect x="228" y="246" width="130" height="20" rx="10" fill="#ffffff" opacity="0.48"/>
      <rect x="228" y="275" width="196" height="20" rx="10" fill="#ffffff" opacity="0.28"/>

      <!-- Thin divider hint -->
      <line x1="228" y1="316" x2="596" y2="316" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

      <!-- Assistant message 1 (right-aligned, Claude orange) -->
      <rect x="308" y="330" width="184" height="20" rx="10" fill="#FF8C55" opacity="0.84"/>
      <rect x="356" y="359" width="140" height="20" rx="10" fill="#FF8C55" opacity="0.55"/>

      <!-- Thin divider hint -->
      <line x1="228" y1="401" x2="596" y2="401" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

      <!-- User message 2 (left-aligned, white) -->
      <rect x="228" y="414" width="163" height="20" rx="10" fill="#ffffff" opacity="0.48"/>

      <!-- Thin divider hint -->
      <line x1="228" y1="455" x2="596" y2="455" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

      <!-- Assistant message 2 (right-aligned, Claude orange) -->
      <rect x="318" y="468" width="174" height="20" rx="10" fill="#FF8C55" opacity="0.84"/>
      <rect x="362" y="497" width="116" height="20" rx="10" fill="#FF8C55" opacity="0.55"/>

    </g>

    <!-- ── Magnifying glass ring ── -->
    <circle cx="410" cy="385" r="244" fill="none"
            stroke="url(#ringGrad)" stroke-width="58"/>

    <!-- Ring highlight: soft white arc on top-left -->
    <circle cx="410" cy="385" r="244" fill="none"
            stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"
            stroke-dasharray="275 1258" stroke-dashoffset="-95"/>

    <!-- ── Handle–ring junction patch (fills any seam) ── -->
    <circle cx="583" cy="558" r="34" fill="#CC4200"/>

    <!-- Junction highlight -->
    <circle cx="575" cy="550" r="14" fill="#ffffff" opacity="0.09"/>

  </g>
</svg>
